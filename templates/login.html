<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso · Portal SAT UM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --um-amarillo: #f2b705;
            --um-azul: #005aa9;
            --um-gris: #f5f7fa;
            --texto: #333;
            --rojo: #e74c3c;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--um-gris);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 6px solid var(--um-amarillo);
        }
        .logo-um {
            max-width: 160px;
            margin-bottom: 20px;
        }
        h1 {
            color: var(--um-azul);
            font-size: 24px;
            margin-bottom: 5px;
            margin-top: 0;
        }
        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label.input-label {
            display: block;
            font-size: 12px;
            color: var(--texto);
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border 0.3s;
        }
        input:focus {
            border-color: var(--um-azul);
            outline: none;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            text-align: left;
            background: #fdfdfd;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .checkbox-group input {
            margin-top: 2px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        .checkbox-group label {
            font-size: 12px;
            font-weight: normal;
            color: #555;
            margin: 0;
            cursor: pointer;
            line-height: 1.5;
        }
        button {
            width: 100%;
            background: var(--um-azul);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #004482;
        }
        .error-message {
            background: #ffebee;
            color: var(--rojo);
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid #ffcdd2;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="{{ url_for('static', filename='logo um.jpg') }}" alt="Universidad Mayor" class="logo-um" onerror="this.style.display='none'">
        
        <h1>Portal SAT</h1>
        <p class="subtitle"><i class="fa-solid fa-lock"></i> Acceso Seguro</p>

        {% if error %}
        <div class="error-message">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username" class="input-label">Usuario</label>
                <input type="text" id="username" name="username" placeholder="ej: juan.perez" required>
            </div>
            
            <div class="form-group">
                <label for="password" class="input-label">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terminos" name="terminos" required>
                <label for="terminos">Declaro mi responsabilidad sobre el uso y estricta confidencialidad de la información contenida en este portal institucional.</label>
            </div>

            <button type="submit">Ingresar al Portal</button>
        </form>
    </div>

</body>
</html>
