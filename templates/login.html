<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso · Portal SAT UM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --um-amarillo: #f2b705;
            --um-azul: #005aa9;
            --um-gris: #f5f7fa;
            --texto: #333;
            --texto-suave: #888;
            --rojo: #e74c3c;
            --borde: #ccc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--um-gris);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative; /* Necesario para el footer absoluto */
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 6px solid var(--um-amarillo);
            margin-bottom: 60px; /* Espacio para el footer */
        }
        .logo-um {
            max-width: 180px; 
            height: auto;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            /* Si tu logo tiene fondo blanco, esto lo funde con el fondo de la tarjeta */
            mix-blend-mode: multiply; 
        }
        h1 {
            color: var(--um-azul);
            font-size: 24px;
            margin-bottom: 5px;
            margin-top: 0;
        }
        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative; /* Para posicionar el ojo dentro del input */
        }
        label.input-label {
            display: block;
            font-size: 12px;
            color: var(--texto);
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            padding-right: 40px; /* Espacio para el icono del ojo */
            border: 1px solid var(--borde);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: var(--um-azul);
            outline: none;
        }
        /* Estilos específicos para el conmutador de contraseña */
        .toggle-password {
            position: absolute;
            right: 12px;
            bottom: 12px; /* Alineado con el centro del input */
            cursor: pointer;
            color: #aaa;
            transition: color 0.3s;
            z-index: 10;
        }
        .toggle-password:hover {
            color: var(--um-azul);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            text-align: left;
            background: #fdfdfd;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .checkbox-group input {
            margin-top: 2px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        .checkbox-group label {
            font-size: 12px;
            font-weight: normal;
            color: #555;
            margin: 0;
            cursor: pointer;
            line-height: 1.5;
        }
        .btn-ingresar {
            width: 100%;
            background: var(--um-azul);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-ingresar:hover {
            background: #004482;
        }
        .error-message {
            background: #ffebee;
            color: var(--rojo);
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid #ffcdd2;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }
        /* Estilos del Footer discreto */
        .login-footer {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: var(--texto-suave);
            font-weight: 300;
        }
        
        /* Boton de Geovictoria hover */
        .btn-geo:hover {
            background-color: #e2eaf3 !important;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="{{ url_for('static', filename='logo um.jpg') }}" alt="Universidad Mayor" class="logo-um" onerror="this.style.display='none'">
        
        <h1>Portal SAT</h1>
        <p class="subtitle"><i class="fa-solid fa-lock"></i> Acceso Seguro</p>

        {% if error %}
        <div class="error-message">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username" class="input-label">Usuario</label>
                <input type="text" id="username" name="username" placeholder="ej: juan.perez" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password" class="input-label">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                <i class="fa-solid fa-eye toggle-password" id="togglePasswordIcon"></i>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terminos" name="terminos" required>
                <label for="terminos">Declaro mi responsabilidad sobre el uso y estricta confidencialidad de la información contenida en este portal institucional.</label>
            </div>

            <button type="submit" class="btn-ingresar">Ingresar al Portal</button>
        </form>

        <div style="text-align: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #dde4ee;">
            <p style="font-size: 0.85rem; color: #666666; margin-bottom: 10px;">¿Tu primer acceso del día?</p>
            <a href="https://clients.geovictoria.com/account/login?idiom=es" target="_blank" class="btn-geo"
               style="display: inline-flex; align-items: center; gap: 8px; background-color: #f0f4f8; color: var(--um-azul); padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.9rem; border: 1px solid #dde4ee; transition: all 0.2s;">
                <i class="fas fa-clock"></i> Marcar entrada en GeoVictoria
            </a>
        </div>
        
    </div>

    <footer class="login-footer">
        Desarrollado con <i class="fas fa-bolt" style="color: var(--um-amarillo);"></i> por Eduardo Ferrada | Universidad Mayor &copy; 2026
    </footer>

    <script>
        const togglePasswordIcon = document.querySelector('#togglePasswordIcon');
        const passwordInput = document.querySelector('#password');

        togglePasswordIcon.addEventListener('click', function (e) {
            // Alternar el tipo de input entre password y text
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Alternar el icono (ojo abierto / ojo cerrado)
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>

</body>
</html>
