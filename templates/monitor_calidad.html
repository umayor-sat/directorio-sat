<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Calidad — SAT Universidad Mayor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --amarillo: #f2b705; --amarillo-dark: #d4a004; --amarillo-bg: #fffbe6;
    --azul: #005baa; --azul-dark: #004490;
    --negro: #1a1a1a; --gris-dark: #3D3D3D; --gris-mid: #6b6b6b;
    --gris-light: #e4e4e4; --gris-pale: #f3f6f9; --border: #d8d8d8; --white: #ffffff;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; background: var(--gris-pale); color: var(--gris-dark); min-height: 100vh; }

  /* HEADER */
  .header { background: var(--amarillo); padding: 20px 30px; display: flex; align-items: center; gap: 25px; }
  .header img { height: 90px; background: white; padding: 5px; border-radius: 4px; }
  .header-text h1 { margin: 0; font-size: 24px; color: #002f6c; }
  .header-text p { margin: 4px 0 0; font-size: 14px; color: #002f6c; font-weight: 500; }

  .container { max-width: 1000px; margin: 30px auto; background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

  .section-title { font-size: 18px; font-weight: 700; color: var(--azul); margin-bottom: 20px; padding-bottom: 8px; border-bottom: 2px solid var(--amarillo); display: flex; align-items: center; gap: 10px; }

  /* FORMULARIO */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; font-weight: 600; color: var(--gris-mid); text-transform: uppercase; }
  input[type="text"], textarea, select { padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; font-family: inherit; transition: border-color 0.2s; background: white; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--azul); }

  /* RADIO BUTTONS MEJORADOS */
  .radio-group { display: flex; gap: 10px; background: var(--gris-pale); padding: 8px; border-radius: 8px; }
  .radio-item { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 13px; background: white; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); flex: 1; justify-content: center; transition: all 0.2s; }
  .radio-item:has(input:checked) { background: var(--azul); color: white; border-color: var(--azul); }
  .radio-item input { cursor: pointer; width: 15px; height: 15px; }

  textarea { min-height: 100px; resize: vertical; }

  /* BOTONES */
  .actions { display: flex; gap: 12px; margin-top: 20px; }
  .btn { padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
  .btn-primary { background: var(--azul); color: white; }
  .btn-primary:hover { background: var(--azul-dark); transform: translateY(-1px); }
  .btn-secondary { background: var(--gris-light); color: var(--gris-dark); }
  .btn-secondary:hover { background: #d0d0d0; }
  .btn-home { background: var(--azul); color: white; margin-left: auto; }

  /* TOAST */
  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 50px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; }
  #toast.show { opacity: 1; }

  .btn-reporte-flotante { position: fixed; bottom: 24px; left: 24px; background: #cc0000; color: white; width: 52px; height: 52px; border-radius: 50%; font-size: 1.3rem; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.25); z-index: 300; display: flex; align-items: center; justify-content: center; text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <img src="{{ url_for('static', filename='img/logoum.jpg') }}" alt="Universidad Mayor">
  <div class="header-text">
    <h1>Monitor de Calidad</h1>
    <p>SAT – Sistema de Atención Telefónica</p>
  </div>
</div>

<div class="container">
  
  <div class="section-title">👤 Información de la Llamada</div>
  <div class="grid">
    <div class="field">
      <label>Ejecutivo/a Evaluado</label>
      <select id="ejecutivo">
        <option value="">Seleccione ejecutivo...</option>
        <option value="Bárbara Fernandez">Bárbara Fernandez</option>
        <option value="Johanna Escalona">Johanna Escalona</option>
        <option value="Maria Jesus Serrano">Maria Jesus Serrano</option>
        <option value="Eduardo Ferrada">Eduardo Ferrada</option>
        <option value="Apoyo Externo">Apoyo Externo / Staff</option>
      </select>
    </div>
    <div class="field">
      <label>Nombre Solicitante</label>
      <input type="text" id="nombre_solicitante" placeholder="Quien llama">
    </div>
    <div class="field">
      <label>RUT Solicitante (Opcional)</label>
      <input type="text" id="rut" placeholder="123456789">
    </div>
    <div class="field">
      <label>Fecha de Evaluación</label>
      <input type="text" id="fecha_actual" readonly style="background:#f0f0f0; cursor: not-allowed;" title="La fecha se asigna automáticamente">
    </div>
  </div>

  <div class="section-title">📝 Protocolos Institucionales</div>
  <div class="grid">
    <div class="field">
      <label>Saludo Institucional</label>
      <div class="radio-group">
        <label class="radio-item"><input type="radio" name="saludo" value="Sí" checked> Sí</label>
        <label class="radio-item"><input type="radio" name="saludo" value="No"> No</label>
        <label class="radio-item"><input type="radio" name="saludo" value="Incompleto"> Incompleto</label>
      </div>
    </div>
    <div class="field">
      <label>Asegura la Llamada</label>
      <div class="radio-group">
        <label class="radio-item"><input type="radio" name="asegura" value="Sí" checked> Sí</label>
        <label class="radio-item"><input type="radio" name="asegura" value="No"> No</label>
        <label class="radio-item"><input type="radio" name="asegura" value="Incompleto"> Incompleto</label>
      </div>
    </div>
    <div class="field">
      <label>Despedida Institucional</label>
      <div class="radio-group">
        <label class="radio-item"><input type="radio" name="despedida" value="Sí" checked> Sí</label>
        <label class="radio-item"><input type="radio" name="despedida" value="No"> No</label>
        <label class="radio-item"><input type="radio" name="despedida" value="Incompleto"> Incompleto</label>
      </div>
    </div>
  </div>

  <div class="section-title">💬 Resumen y Transcripción</div>
  <div class="field" style="margin-bottom: 20px;">
    <label>Resumen de la Llamada</label>
    <textarea id="resumen" placeholder="Ej: Solicita certificado de alumno regular..."></textarea>
  </div>
  <div class="field">
    <label>Transcripción o Notas del Monitoreo</label>
    <textarea id="transcripcion" style="min-height: 150px;" placeholder="Detalle de la interacción..."></textarea>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="copiarTodo()">📋 Copiar Evaluación</button>
    <button class="btn btn-secondary" onclick="limpiar()">🧹 Limpiar</button>
    <a href="/" class="btn btn-home">Volver al Inicio</a>
  </div>

</div>

<a href="mailto:eduardo.ferrada@umayor.cl?subject=🐛 Reporte de error – Monitor Calidad&body=Error detectado:" class="btn-reporte-flotante" title="Reportar un error">🐛</a>

<div id="toast">✅ Evaluación copiada al portapapeles</div>

<script>
  // Autocompletar fecha (No editable por el usuario)
  const hoy = new Date();
  document.getElementById('fecha_actual').value = hoy.toLocaleDateString('es-CL');

  function copiarTodo() {
    var ej = document.getElementById('ejecutivo').value || '—';
    var nom = document.getElementById('nombre_solicitante').value.trim();
    var rut = document.getElementById('rut').value.trim();
    var sal = document.querySelector('input[name="saludo"]:checked').value;
    var aseg = document.querySelector('input[name="asegura"]:checked').value;
    var desp = document.querySelector('input[name="despedida"]:checked').value;
    var res = document.getElementById('resumen').value.trim() || '—';
    var trans = document.getElementById('transcripcion').value.trim() || '—';

    var nomLinea = nom ? 'Nombre solicitante: ' + nom + '\n' : '';
    var rutLinea = rut ? 'RUT solicitante: ' + rut + '\n' : '';

    var texto = 
      'EVALUACIÓN DE LLAMADA — SAT / Universidad Mayor\n' +
      '================================================\n' +
      'Fecha: ' + document.getElementById('fecha_actual').value + '\n' +
      'Ejecutivo/a: ' + ej + '\n' +
      nomLinea + rutLinea +
      '------------------------------------------------\n' +
      'Saludo institucional: ' + sal + '\n' +
      'Asegura llamada: ' + aseg + '\n' +
      'Despedida institucional: ' + desp + '\n\n' +
      'RESUMEN SOLICITUD:\n' + res + '\n\n' +
      'NOTAS DE MONITOREO:\n' + trans;

    navigator.clipboard.writeText(texto).then(function() {
      var t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2200);
    });
  }

  function limpiar() {
    if (!confirm('¿Limpiar todos los campos y volver al inicio?')) return;
    
    document.getElementById('ejecutivo').value = '';
    document.getElementById('nombre_solicitante').value = '';
    document.getElementById('rut').value = '';
    document.getElementById('resumen').value = '';
    document.getElementById('transcripcion').value = '';
    
    document.querySelectorAll('input[type=radio]').forEach(function(r) { 
      if(r.value === 'Sí') r.checked = true;
    });

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>

</body>
</html>
