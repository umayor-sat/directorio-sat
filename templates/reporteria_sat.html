<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reportería SAT 2026</title>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }
.header { background:#4a4a4a; color:#fff; padding:20px; }
.kpi { display:grid; grid-template-columns:repeat(3,1fr); gap:15px; padding:20px; }
.card { background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.numero { font-size:28px; font-weight:bold; }
</style>
</head>

<body>

<div class="header">
  <h1>REPORTERÍA SAT 2026</h1>
</div>

<div class="kpi">
  <div class="card"><div>Consultas</div><div id="consulta" class="numero">—</div></div>
  <div class="card"><div>Quejas</div><div id="queja" class="numero">—</div></div>
  <div class="card"><div>Reclamos</div><div id="reclamo" class="numero">—</div></div>
  <div class="card"><div>Riesgo</div><div id="riesgo" class="numero">—</div></div>
  <div class="card"><div>Agradecimiento</div><div id="agradecimiento" class="numero">—</div></div>
  <div class="card"><div>Felicitaciones</div><div id="felicitaciones" class="numero">—</div></div>
</div>

<script>
const SUPABASE_URL = "https://TU_URL.supabase.co";
const SUPABASE_KEY = "TU_KEY";

/* 🔹 FUNCIÓN BASE */
async function fetchData(query) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${query}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }

  return res.json();
}

/* 🔹 KPI 2026 (OPTIMIZADO) */
async function cargarKPIs() {
  try {
    const data = await fetchData(
      `rpc/kpi_2026`   // 👈 AQUÍ ESTÁ LA CLAVE
    );

    data.forEach(row => {
      const tipo = row.tipo;
      const total = row.total;

      if (tipo === "Consulta") document.getElementById("consulta").textContent = total;
      if (tipo === "Queja") document.getElementById("queja").textContent = total;
      if (tipo === "Reclamo") document.getElementById("reclamo").textContent = total;
      if (tipo === "Riesgo") document.getElementById("riesgo").textContent = total;
      if (tipo === "Agradecimiento") document.getElementById("agradecimiento").textContent = total;
      if (tipo === "Felicitaciones") document.getElementById("felicitaciones").textContent = total;
    });

  } catch (e) {
    console.error("Error KPI:", e);
  }
}

cargarKPIs();
</script>

</body>
</html>
