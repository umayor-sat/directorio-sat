<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reportería SAT 2026</title>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background:#f3f6f9;
  margin:0;
}

.header {
  background:#4a4a4a;
  color:#fff;
  padding:25px;
}

.header-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.header-stats {
  display:flex;
  gap:40px;
  flex-wrap:wrap;
}

.stat {
  font-size:13px;
}

.stat .label {
  opacity:0.7;
}

.stat .value {
  font-size:18px;
  font-weight:bold;
}

.kpi-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:20px;
}

.card {
  background:#fff;
  border-radius:10px;
  padding:20px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  position:relative;
}

.card::before {
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:6px;
  border-radius:10px 0 0 10px;
}

.consulta::before { background:#2196F3; }
.queja::before { background:#FFC107; }
.reclamo::before { background:#F44336; }
.riesgo::before { background:#FF9800; }
.agradecimiento::before { background:#4CAF50; }
.felicitaciones::before { background:#66BB6A; }

.titulo { font-weight:700; font-size:14px; margin-bottom:10px; }
.numero { font-size:32px; font-weight:800; }
.pct { font-size:13px; color:#777; }
</style>
</head>

<body>

<div class="header">

  <div class="header-top">
    <h1>REPORTERÍA SAT 2026</h1>
    <div id="fecha"></div>
  </div>

  <div class="header-stats">
    <div class="stat">
      <div class="label">Total 2026</div>
      <div id="total2026" class="value">—</div>
    </div>

    <div class="stat">
      <div class="label">Total 2025</div>
      <div id="total2025" class="value">—</div>
    </div>

    <div class="stat">
      <div class="label">Variación</div>
      <div id="variacion" class="value">—</div>
    </div>
  </div>

</div>

<div class="kpi-grid">

  <div class="card consulta">
    <div class="titulo">CONSULTAS</div>
    <div id="consulta" class="numero">—</div>
    <div id="pct-consulta" class="pct"></div>
  </div>

  <div class="card queja">
    <div class="titulo">QUEJAS</div>
    <div id="queja" class="numero">—</div>
    <div id="pct-queja" class="pct"></div>
  </div>

  <div class="card reclamo">
    <div class="titulo">RECLAMOS</div>
    <div id="reclamo" class="numero">—</div>
    <div id="pct-reclamo" class="pct"></div>
  </div>

  <div class="card riesgo">
    <div class="titulo">RIESGO</div>
    <div id="riesgo" class="numero">—</div>
    <div id="pct-riesgo" class="pct"></div>
  </div>

  <div class="card agradecimiento">
    <div class="titulo">AGRADECIMIENTO</div>
    <div id="agradecimiento" class="numero">—</div>
    <div id="pct-agradecimiento" class="pct"></div>
  </div>

  <div class="card felicitaciones">
    <div class="titulo">FELICITACIONES</div>
    <div id="felicitaciones" class="numero">—</div>
    <div id="pct-felicitaciones" class="pct"></div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://jxmrznqppddabuqtbufq.supabase.co";
const SUPABASE_KEY = "TU_KEY_AQUI";

/* KPI */
async function cargarKPIs() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/kpi_2026`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  let totalGeneral = 0;
  data.forEach(r => totalGeneral += r.total);

  data.forEach(row => {
    const tipo = row.tipo;
    const total = row.total;
    const pct = ((total / totalGeneral) * 100).toFixed(1);

    if (tipo === "Consulta") {
      document.getElementById("consulta").textContent = total;
      document.getElementById("pct-consulta").textContent = pct + "%";
    }
    if (tipo === "Queja") {
      document.getElementById("queja").textContent = total;
      document.getElementById("pct-queja").textContent = pct + "%";
    }
    if (tipo === "Reclamo") {
      document.getElementById("reclamo").textContent = total;
      document.getElementById("pct-reclamo").textContent = pct + "%";
    }
    if (tipo === "Riesgo") {
      document.getElementById("riesgo").textContent = total;
      document.getElementById("pct-riesgo").textContent = pct + "%";
    }
    if (tipo === "Agradecimiento") {
      document.getElementById("agradecimiento").textContent = total;
      document.getElementById("pct-agradecimiento").textContent = pct + "%";
    }
    if (tipo === "Felicitaciones") {
      document.getElementById("felicitaciones").textContent = total;
      document.getElementById("pct-felicitaciones").textContent = pct + "%";
    }
  });
}

/* FECHA */
async function cargarFecha() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/ultima_fecha`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  if (data) {
    const fecha = new Date(data);
    document.getElementById("fecha").textContent =
      "Actualizado al: " + fecha.toLocaleString("es-CL");
  }
}

/* TOTALES */
async function cargarTotales() {

  const res2026 = await fetch(`${SUPABASE_URL}/rest/v1/rpc/total_2026`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });

  const res2025 = await fetch(`${SUPABASE_URL}/rest/v1/rpc/total_2025`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });

  const resVar = await fetch(`${SUPABASE_URL}/rest/v1/rpc/variacion_2026_vs_2025`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });

  const total2026 = await res2026.json();
  const total2025 = await res2025.json();
  const variacion = await resVar.json();

  document.getElementById("total2026").textContent = total2026;
  document.getElementById("total2025").textContent = total2025;
  document.getElementById("variacion").textContent = variacion.toFixed(1) + "%";
}

/* INIT */
cargarKPIs();
cargarFecha();
cargarTotales();

</script>

</body>
</html>
